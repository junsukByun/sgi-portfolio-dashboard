<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SGI 포트폴리오 대시보드</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d27;
    --border: #2a2d3a;
    --text: #e4e4e7;
    --muted: #8b8fa3;
    --accent: #6366f1;
    --accent2: #22d3ee;
    --green: #22c55e;
    --red: #ef4444;
    --yellow: #eab308;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif; background:var(--bg); color:var(--text); }
  .header { padding:24px 32px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
  .header h1 { font-size:22px; font-weight:700; }
  .header h1 span { color:var(--accent); }
  .header .meta { color:var(--muted); font-size:13px; }
  .kpi-row { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; padding:24px 32px; }
  .kpi { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:20px; }
  .kpi .label { font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:8px; }
  .kpi .value { font-size:28px; font-weight:700; }
  .kpi .value.accent { color:var(--accent); }
  .kpi .value.cyan { color:var(--accent2); }
  .kpi .value.green { color:var(--green); }
  .kpi .sub { font-size:12px; color:var(--muted); margin-top:4px; }
  .grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; padding:0 32px 24px; }
  .grid.triple { grid-template-columns:1fr 1fr 1fr; }
  .card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:20px; }
  .card h3 { font-size:14px; font-weight:600; margin-bottom:16px; color:var(--muted); }
  .chart-wrap { position:relative; height:280px; }
  .chart-wrap.tall { height:350px; }
  .full-width { padding:0 32px 24px; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th { text-align:left; padding:10px 12px; border-bottom:2px solid var(--border); color:var(--muted); font-weight:600; font-size:11px; text-transform:uppercase; letter-spacing:0.5px; position:sticky; top:0; background:var(--card); }
  td { padding:8px 12px; border-bottom:1px solid var(--border); }
  tr:hover td { background:rgba(99,102,241,0.05); }
  .badge { display:inline-block; padding:2px 8px; border-radius:6px; font-size:11px; font-weight:600; }
  .badge.bio { background:rgba(168,85,247,0.15); color:#a855f7; }
  .badge.mfg { background:rgba(249,115,22,0.15); color:#f97316; }
  .badge.ai { background:rgba(34,211,238,0.15); color:#22d3ee; }
  .badge.semi { background:rgba(99,102,241,0.15); color:#6366f1; }
  .badge.energy { background:rgba(34,197,94,0.15); color:#22c55e; }
  .badge.sw { background:rgba(59,130,246,0.15); color:#3b82f6; }
  .badge.consumer { background:rgba(244,63,94,0.15); color:#f43f5e; }
  .badge.logistics { background:rgba(234,179,8,0.15); color:#eab308; }
  .badge.space { background:rgba(139,92,246,0.15); color:#8b5cf6; }
  .badge.content { background:rgba(236,72,153,0.15); color:#ec4899; }
  .bar-cell { display:flex; align-items:center; gap:8px; }
  .bar { height:6px; border-radius:3px; background:var(--accent); min-width:2px; }
  .table-scroll { max-height:500px; overflow-y:auto; }
  .table-scroll::-webkit-scrollbar { width:6px; }
  .table-scroll::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
  .search-box { padding:0 32px 16px; }
  .search-box input { width:100%; padding:10px 16px; background:var(--card); border:1px solid var(--border); border-radius:8px; color:var(--text); font-size:14px; outline:none; }
  .search-box input:focus { border-color:var(--accent); }
  .search-box input::placeholder { color:var(--muted); }
  .fund-pills { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:12px; }
  .pill { padding:4px 10px; border-radius:6px; font-size:11px; cursor:pointer; border:1px solid var(--border); color:var(--muted); transition:all 0.2s; }
  .pill:hover, .pill.active { border-color:var(--accent); color:var(--accent); background:rgba(99,102,241,0.1); }
  .amount { font-variant-numeric:tabular-nums; text-align:right; }
  .section-title { padding:8px 32px 8px; font-size:16px; font-weight:700; }
  .multi-badge { display:inline-block; background:rgba(234,179,8,0.15); color:#eab308; padding:1px 6px; border-radius:4px; font-size:10px; font-weight:700; margin-left:4px; }
</style>
</head>
<body>

<div class="header">
  <h1><span>SGI</span> 포트폴리오 대시보드</h1>
  <div class="meta">기준일: 2026.01.30 | 투자총괄표 기준</div>
</div>

<div class="kpi-row" id="kpis"></div>

<div class="grid">
  <div class="card">

<div class="grid">

</div>

<div class="section-title">전체 포트폴리오</div>
<div class="search-box">

</div>
<div class="full-width">
  <div class="fund-pills" id="fundPills"></div>
</div>
<div class="full-width">
  <div class="card">
    <div class="table-scroll">
      <table>
        <thead>
          <tr>
            <th style="width:40px">#</th>
            <th>기업명</th>

          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>
</div>

<div style="padding:24px 32px; text-align:center; color:var(--muted); font-size:11px;">

// Process data
const companies = Object.entries(RAW_DATA)
  .map(([k, v]) => ({ key: k, ...v }))
  .sort((a, b) => b.total - a.total);

const totalAmt = companies.reduce((s, c) => s + c.total, 0);
const maxAmt = companies[0]?.total || 1;

// Sector stats
const sectorStats = {};
companies.forEach(c => {
  if (!sectorStats[c.sector]) sectorStats[c.sector] = { count: 0, amount: 0 };
  sectorStats[c.sector].count++;
  sectorStats[c.sector].amount += c.total;
});
const sectorArr = Object.entries(sectorStats).sort((a, b) => b[1].amount - a[1].amount);

// Fund stats
const fundStats = {};
companies.forEach(c => {
  Object.entries(c.funds).forEach(([f, a]) => {
    if (!fundStats[f]) fundStats[f] = { count: 0, amount: 0 };
    fundStats[f].count++;
    fundStats[f].amount += a;
  });
});
const fundArr = Object.entries(fundStats).sort((a, b) => b[1].amount - a[1].amount);

// Fund pills
let activeFund = null;
const pillsEl = document.getElementById('fundPills');
const allPill = document.createElement('div');
allPill.className = 'pill active';

allPill.onclick = () => { activeFund = null; renderPills(); renderTable(); };
pillsEl.appendChild(allPill);
fundArr.forEach(([f]) => {
  const p = document.createElement('div');
  p.className = 'pill';
  p.textContent = f.length > 20 ? f.substring(0,20)+'...' : f;
  p.title = f;
  p.onclick = () => { activeFund = f; renderPills(); renderTable(); };
  pillsEl.appendChild(p);
});

function renderPills() {
  pillsEl.querySelectorAll('.pill').forEach((p, i) => {
    if (i === 0) p.classList.toggle('active', !activeFund);
    else p.classList.toggle('active', p.title === activeFund || p.textContent === activeFund || (activeFund && p.title === activeFund));
  });
}

// Table
const tbody = document.getElementById('tableBody');
const searchInput = document.getElementById('search');
searchInput.addEventListener('input', renderTable);

function renderTable() {
  const q = searchInput.value.toLowerCase();
  let filtered = companies;
  if (activeFund) filtered = filtered.filter(c => c.funds[activeFund]);
  if (q) filtered = filtered.filter(c =>
    c.name.toLowerCase().includes(q) ||
    c.sector.toLowerCase().includes(q) ||
    Object.keys(c.funds).some(f => f.toLowerCase().includes(q)) ||
    (c.note && c.note.toLowerCase().includes(q))
  );

  tbody.innerHTML = filtered.map((c, i) => {
    const pct = (c.total / maxAmt * 100).toFixed(0);
    const fundCount = Object.keys(c.funds).length;
    const fundNames = Object.entries(c.funds).map(([f, a]) =>
      `${f.length > 20 ? f.substring(0,20)+'...' : f}`
    ).join(', ');
    const multiBadge = fundCount >= 2 ? `<span class="multi-badge">${fundCount}펀드</span>` : '';
    return `<tr>
      <td style="color:var(--muted)">${i+1}</td>
      <td><strong>${c.name}</strong>${multiBadge}<br><span style="font-size:11px;color:var(--muted)">${c.note ? c.note.substring(0,40) : ''}</span></td>
      <td><span class="badge ${SECTOR_BADGE[c.sector]||''}">${c.sector}</span></td>
      <td class="amount"><strong>${c.total.toLocaleString('ko-KR',{maximumFractionDigits:0})}</strong></td>
      <td><div class="bar-cell"><div class="bar" style="width:${pct}%;background:${SECTOR_COLORS[c.sector]||'#555'}"></div><span style="font-size:11px;color:var(--muted)">${(c.total/totalAmt*100).toFixed(1)}%</span></div></td>
      <td style="font-size:11px;color:var(--muted)">${fundNames}</td>
    </tr>`;
  }).join('');
}

renderTable();
</script>
</body>
</html>
